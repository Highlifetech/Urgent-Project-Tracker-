name: Project Due Date Tracker

on:
  schedule:
    - cron: '0 13 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  check-due-dates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run project due date tracker
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_URL: ${{ secrets.LARK_BASE_URL }}
          LARK_BASE_APP_TOKEN: ${{ secrets.LARK_BASE_APP_TOKEN }}
          LARK_CHAT_ID_HANNAH: ${{ secrets.LARK_CHAT_ID_HANNAH }}
          LARK_CHAT_ID_LUCY: ${{ secrets.LARK_CHAT_ID_LUCY }}
          LARK_CHAT_ID_CHEN: ${{ secrets.LARK_CHAT_ID_CHEN }}
          LARK_CHAT_ID_MASTER: ${{ secrets.LARK_CHAT_ID_MASTER }}
          LARK_CHAT_ID_HANNAH_ARTWORK: ${{ secrets.LARK_CHAT_ID_HANNAH_ARTWORK }}
          LARK_CHAT_ID_LUCY_ARTWORK: ${{ secrets.LARK_CHAT_ID_LUCY_ARTWORK }}
          LARK_CHAT_ID_SHIPMENTS_LUCY: ${{ secrets.LARK_CHAT_ID_SHIPMENTS_LUCY }}
          LARK_CHAT_ID_HLT_DESIGN: ${{ secrets.LARK_CHAT_ID_HLT_DESIGN }}
          LARK_CHAT_ID_ORDER_ISSUES_HANNAH: ${{ secrets.LARK_CHAT_ID_ORDER_ISSUES_HANNAH }}
          LARK_CHAT_ID_ORDER_ISSUES_LUCY: ${{ secrets.LARK_CHAT_ID_ORDER_ISSUES_LUCY }}
          LARK_CHAT_ID_QUOTES_HANNAH: ${{ secrets.LARK_CHAT_ID_QUOTES_HANNAH }}
          LARK_CHAT_ID_QUOTES_LUCY: ${{ secrets.LARK_CHAT_ID_QUOTES_LUCY }}
          LARK_CHAT_ID_SAMPLES_LUCY: ${{ secrets.LARK_CHAT_ID_SAMPLES_LUCY }}
          LARK_CHAT_ID_HLT_CARLO: ${{ secrets.LARK_CHAT_ID_HLT_CARLO }}
          LARK_CHAT_ID_HLT_INBOUND: ${{ secrets.LARK_CHAT_ID_HLT_INBOUND }}
        run: python main.py
