name: Iron Bot Morning Digest + Due Date Alerts

# Primary scheduling now handled by APScheduler inside the bot on Railway
# This workflow is kept as a MANUAL BACKUP trigger only
on:
  workflow_dispatch:

jobs:
  morning-digest-and-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger morning digest + due date alerts
        run: |
          curl -X POST \
            -H "X-Digest-Secret: ${{ secrets.DIGEST_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail-with-body \
            https://web-production-f965d.up.railway.app/morning-digest
        timeout-minutes: 3

      - name: Trigger comment check
        run: |
          curl -X POST \
            -H "X-Digest-Secret: ${{ secrets.DIGEST_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail-with-body \
            https://web-production-f965d.up.railway.app/check-comments
        timeout-minutes: 2
