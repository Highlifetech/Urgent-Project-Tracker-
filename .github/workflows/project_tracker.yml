name: Project Due Date Tracker

on:
  schedule:
    # 8:00 AM UTC  (adjust to your timezone if needed — UTC-5 EST = 13:00 UTC)
    - cron: '0 13 * * *'
    # 8:00 PM UTC
    - cron: '0 1 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  check-due-dates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run project due date tracker
        env:
          LARK_APP_ID:           ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET:       ${{ secrets.LARK_APP_SECRET }}
          LARK_BASE_URL:         ${{ secrets.LARK_BASE_URL }}
          LARK_CHAT_ID:          ${{ secrets.LARK_CHAT_ID }}
          LARK_BASE_APP_TOKEN:   ${{ secrets.LARK_BASE_APP_TOKEN }}
          LARK_BASE_TABLE_IDS:   ${{ secrets.LARK_BASE_TABLE_IDS }}
        run: python main.py
